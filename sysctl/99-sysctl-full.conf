## Sysctl Configuration: Azure Linux Tuning
# This configuration is designed for Azure virtual machines with ≥8GB RAM.
# Review all settings carefully before applying to your environment.

### Key Points:
#- **Documented Parameters**: Each parameter includes documentation and references for custom tuning.
#- **Commented Parameters**: Some parameters are commented and include deployment-specific notes.
#- **Kernel Compatibility**: Optimized for Linux kernel 4.9+. Earlier kernels need adjustments.
#- **Safe Defaults**: Uncommented parameters are safe for most environments but should be reviewed.

### Recommendation:
#Review all settings thoroughly before deployment. While these settings work well for most scenarios,
#specific adjustments may be required for your workload and requirements.

# TCP/UDP buffer sizing (in pages)
# Set MIN value: 8192 (increased from 4096 for better performance)
# MAX value: 64MB for TCP, 32MB for UDP
net.ipv4.tcp_rmem = 8192 87380 67108864
net.ipv4.tcp_wmem = 8192 65536 67108864

# Default receive/transmit buffer in bytes (32MB)
net.core.rmem_default = 33554432
net.core.wmem_default = 33554432

# UDP socket buffer minimums (in bytes)
net.ipv4.udp_wmem_min = 16384
net.ipv4.udp_rmem_min = 16384

# Maximum receive/transmit buffer in bytes (128MB)
# For 100G+ connections, this can scale to 2GB (2147483647)
net.core.wmem_max = 134217728
net.core.rmem_max = 134217728

# Low-latency busy poll timeout (microseconds)
# Trades CPU for reduced latency in high-frequency applications
# Requires CONFIG_NET_RX_BUSY_POLL kernel support
net.core.busy_poll = 50
net.core.busy_read = 50

# MSS (Maximum Segment Size) behavior parameters
# In most cases these should not be changed but here are the references if that is needed
# The advertised MSS depends on the first hop route MTU, but will never be lower than this setting
# net.ipv4.route.min_adv_mss = 256

# The initial value of search_low to be used by the packetization layer Path MTU discovery (MTU probing). If MTU probing is enabled, this is the initial MSS used by the connection.
# net.ipv4.tcp_base_mss = 1350

# TCP SYN and SYNACK messages usually advertise an ADVMSS option, as described in RFC 1122 and RFC 6691.
# If this ADVMSS option is smaller than tcp_min_snd_mss, it is silently capped to tcp_min_snd_mss.
# Default is set to 48 (at least 8 bytes of payload per segment)
# net.ipv4.tcp_min_snd_mss = 48

# Controls path MTU discovery (Change to 1 if jumbo frames are enabled, jumbo frames ARE NOT supported on Azure)
# 0 = Disabled, 1 = Disabled by default, enabled if an ICMP blackhole is detected, 2 = Always enabled, use initial value of tcp_base_mss.
net.ipv4.tcp_mtu_probing = 0

# By default, TCP saves various connection metrics in the route cache when the connection closes, so that connections established in the near future can use these to set initial conditions.
# Usually, this increases overall performance, but it might sometimes cause performance degradation.
# If set, TCP will not cache metrics on closing connections.
net.ipv4.tcp_no_metrics_save = 0

# If set, TCP performs receive buffer auto-tuning, attempting to automatically size the buffer (no greater than tcp_rmem) to match the size required by the path for full throughput.
# Enabled by default.
net.ipv4.tcp_moderate_rcvbuf = 1

# Turn on TCP window scaling
net.ipv4.tcp_window_scaling = 1

# Limit the maximum memory used to reassemble IP fragments (CVE-2018-5391)
net.ipv4.ipfrag_low_thresh = 196608
net.ipv6.ip6frag_low_thresh = 196608
net.ipv4.ipfrag_high_thresh = 262144
net.ipv6.ip6frag_high_thresh = 262144

# Prevent SYN attacks using SYN cookies (triggered at max_syn_backlog)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_max_syn_backlog = 65535

# Reduce default TCP FIN timeout for faster connection cleanup
net.ipv4.tcp_fin_timeout = 10

# TCP keepalive parameters: idle time, probe count, probe interval
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_keepalive_intvl = 15

# Recommended default values for Cassandra deployments
#net.ipv4.tcp_keepalive_time=60
#net.ipv4.tcp_keepalive_probes=3
#net.ipv4.tcp_keepalive_intvl=10


# Enable TCP timestamps for better congestion control
# NOTE: Set to 0 if VM is behind an Azure Load Balancer
net.ipv4.tcp_timestamps = 1

# Reuse TCP TIME-WAIT connections (improves outgoing connections)
# Set to 2 for load-balanced scenarios; keep at 1 for general use
net.ipv4.tcp_tw_reuse = 1

# Expand local port range for outbound connections
net.ipv4.ip_local_port_range = 1024 65535

# Enable a fix for RFC1337 - time-wait assassination hazards in TCP
net.ipv4.tcp_rfc1337 = 1

# TCP Congestion Control Algorithm Selection
# BBR (Bottleneck Bandwidth and RTT) vs CUBIC (RFC 8312)
#
# BBR (RECOMMENDED for Azure cross-AZ/region traffic):
#   - Better for high-bandwidth, high-latency connections (WAN/Internet)
#   - Optimizes for throughput by measuring bottleneck bandwidth and RTT
#   - Fills the pipe more efficiently across regions/availability zones
#   - More predictable latency, less queue buildup
#   - Kernel requirement: > 4.9 (verify with: cat /proc/sys/net/ipv4/tcp_available_congestion_control)
#   - Load module: modprobe tcp_bbr
#   - Best for: Cross-region replication, geo-distributed workloads, WAN links
#
# CUBIC (Default in most older Linux):
#   - Better for intra-region/LAN communication (same VNET, low-latency)
#   - AIMD algorithm, uses packet loss as congestion signal
#   - More aggressive in filling available bandwidth quickly
#   - Less stable on high-latency links (causes queue buildup)
#   - Use with: net.core.default_qdisc = pfifo_fast
#   - Best for: Same-region traffic, legacy compatibility, local cluster communication
#
# TESTING REQUIRED: BBR behavior varies by network path and application.
# Always test in your environment before production deployment!
# Verify performance with: iperf3, netperf, or application-specific benchmarks
#
# For kernel < 4.9, use CUBIC with pfifo_fast:
# net.ipv4.tcp_congestion_control = cubic
# net.core.default_qdisc = pfifo_fast
#
# For kernel >= 4.9 (RECOMMENDED):
net.ipv4.tcp_congestion_control = bbr

# A TCP socket can control the amount of unsent bytes in its write queue, thanks to TCP_NOTSENT_LOWAT socket option. 
# poll()/select()/epoll() reports POLLOUT events if the amount of unsent bytes is below a per socket value, and if the write queue is not full. sendmsg() will also not add new buffers if the limit is hit.
# This global variable controls the amount of unsent data for sockets not using TCP_NOTSENT_LOWAT. 
# For these sockets, a change to the global variable has immediate effect.
net.ipv4.tcp_notsent_lowat = 4294967295

# Queue Discipline Selection
# Must be coordinated with tcp_congestion_control choice
#
# fq (Fair Queue) - RECOMMENDED for BBR:
#   - Provides per-flow fairness
#   - Works optimally with BBR algorithm
#   - Better traffic distribution under congestion
#   - Increases CPU slightly but more predictable
#   - Use with: net.ipv4.tcp_congestion_control = bbr
#   - Kernel requirement: > 3.12
#
# pfifo_fast (Packet First-In-First-Out) - RECOMMENDED for CUBIC:
#   - Traditional, simpler queue (FIFO with 3 priority bands)
#   - Works well with CUBIC on local networks
#   - Lower CPU overhead
#   - Less queue buffering, acceptable for LAN
#   - Use with: net.ipv4.tcp_congestion_control = cubic
#
# GUIDANCE:
# - Azure cross-AZ: Use 'fq' with BBR (this file)
# - Azure same-region: Consider 'pfifo_fast' with CUBIC for simplicity
# - High-throughput LAN: 'fq' with BBR usually still better
#
# For servers with tcp-heavy workloads, enable 'fq' queue management scheduler (kernel > 3.12)
net.core.default_qdisc = fq

# Increase the number of incoming connections / number of connections backlog
net.core.somaxconn = 32768
net.core.netdev_max_backlog = 32768
net.core.dev_weight = 64

# High-performance option memory buffers: 20KB default → 65KB (or 1MB for 100G+)
net.core.optmem_max = 65535

# Increase TCP time-wait bucket pool (prevents simple DoS attacks)
net.ipv4.tcp_max_tw_buckets = 360000

# Limit orphan connections (each can use up to 16MB)
net.ipv4.tcp_max_orphans = 16384
net.ipv4.tcp_orphan_retries = 0

# Prevent ARP table from growing too large
net.ipv4.neigh.default.gc_thresh3 = 2048

# ARP garbage collection: aggressive cleanup threshold
net.ipv4.neigh.default.gc_thresh2 = 1024

# ARP garbage collection: conservative cleanup threshold
net.ipv4.neigh.default.gc_thresh1 = 64

# ARP garbage collection interval (seconds)
net.ipv4.neigh.default.gc_interval = 30

# Maximum queued packets for neighbor proxy (default: 64)
net.ipv4.neigh.default.proxy_qlen = 96

# Maximum queued packets for unresolved neighbor entries (default: 3)
net.ipv4.neigh.default.unres_qlen = 6

# Enable Explicit Congestion Notification (RFC 3168), disable it if it doesn't work for you
net.ipv4.tcp_ecn = 1
net.ipv4.tcp_reordering = 3

# TCP connection retry settings
net.ipv4.tcp_retries2 = 15
net.ipv4.tcp_retries1 = 3

# SAP HANA optimization: increased SYN retries (~190 seconds)
net.ipv4.tcp_syn_retries = 8
net.ipv4.tcp_synack_retries = 2

# TCP slow start after idle (0 = disabled for high-throughput, 1 = enabled for fairness)
# Disable for Cassandra and high-throughput workloads; enable for general-purpose
net.ipv4.tcp_slow_start_after_idle = 0

# Abort on listen queue overflow (helps prevent cascade failures)
# Enable only if listening daemon cannot accept connections fast enough
net.ipv4.tcp_abort_on_overflow = 1

# Maximum packets processed per NAPI poll cycle
net.core.netdev_budget = 1000

# Enable TCP Fast Open for reduced handshake latency
# Warning: Some firewalls do not support TFO
net.ipv4.tcp_fastopen = 3

# Early demux: optimize packet routing to local sockets
# Benefits local traffic but may affect routing/forwarding
net.ipv4.ip_early_demux = 1
net.ipv4.tcp_early_demux = 1
net.ipv4.udp_early_demux = 1

# Reverse path filtering: security vs asymmetric routing trade-off
# Mode 2 (loose): Recommended for Azure asymmetric routing
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2
net.ipv4.conf.lo.rp_filter = 2

# Forward RTO: TCP retransmission recovery (RFC 5682)
# Helps distinguish packet loss from congestion
net.ipv4.tcp_frto = 0

# Dirty page threshold: when to start async writes (600MB for 8GB+ VMs)
# Recommended for large-memory systems; test before production
vm.dirty_bytes = 629145600

# Background dirty page threshold (50% of vm.dirty_bytes)
vm.dirty_background_bytes = 314572800

# Disable ratio-based dirty page limits (use bytes instead)
vm.dirty_background_ratio = 0
vm.dirty_ratio = 0

# Swap usage: prefer RAM over disk (0-20 for databases, 20-100 for general-purpose)
vm.swappiness = 10
