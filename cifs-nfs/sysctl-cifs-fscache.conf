# CIFS/SMB Filesystem Cache Tuning for Azure
# Optimizes memory management for CIFS mounts with fscache
# References:
# - [SYSCTL VM Documentation](https://www.kernel.org/doc/html/latest/admin-guide/sysctl/vm.html)
# - [Linux Filesystem Caching](https://www.baeldung.com/linux/file-system-caching)

# Maximum dirty memory before process starts writeback (30MB)
# Note: Only one of dirty_bytes or dirty_ratio can be active at a time
vm.dirty_bytes = 31457280

# Background dirty memory threshold before kernel writeback (16MB)
# Note: Only one of dirty_background_bytes or dirty_background_ratio can be active
vm.dirty_background_bytes = 16777216

# Percentage of available memory for dirty writes (disabled when dirty_bytes is set)
# Set to 0 because dirty_bytes is being used instead
vm.dirty_ratio = 0

# Background dirty threshold as percentage (disabled when dirty_background_bytes is set)
# Set to 0 because dirty_background_bytes is being used instead
vm.dirty_background_ratio = 0

# Maximum age of dirty data before writeback (20 seconds)
# CIFS needs faster writeback for file consistency
vm.dirty_expire_centisecs = 2000

# Kernel writeback interval (1 second)
# Controls how often flusher threads wake up to write data
vm.dirty_writeback_centisecs = 100

# Lazy inode timestamp expiration (1 hour)
# Ensures inodes with updated timestamps get written to disk
vm.dirtytime_expire_seconds = 3600

# Dentry/inode cache pressure for CIFS workloads (40)
# Balances memory usage vs cache efficiency
# Higher values: more aggressive cache shrinking
# Lower values: preserve more cached entries
vm.vfs_cache_pressure = 40
